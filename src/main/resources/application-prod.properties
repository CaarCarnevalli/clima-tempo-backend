spring.application.name=weather-api
server.port=${PORT:8080}

# CORS Configuration - Adicione seu domínio de produção aqui
spring.web.cors.allowed-origins=${CORS_ORIGINS:https://your-frontend-url.com}
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.web.cors.allowed-headers=*
spring.web.cors.allow-credentials=true

# OpenWeatherMap API Key - Use variável de ambiente em produção
weather.api.key=${WEATHER_API_KEY}
weather.api.base-url=https://api.openweathermap.org/data/2.5

# Geocoding API
geocoding.api.base-url=https://api.openweathermap.org/geo/1.0

# Logging - Reduzido para produção
logging.level.com.weather=INFO
logging.level.org.springframework.web=WARN
logging.level.root=WARN
