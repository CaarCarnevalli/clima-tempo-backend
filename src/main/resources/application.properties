spring.application.name=weather-api
server.port=8080

# CORS Configuration
spring.web.cors.allowed-origins=http://localhost:5173,http://localhost:3000
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.web.cors.allowed-headers=*
spring.web.cors.allow-credentials=true

# OpenWeatherMap API Key
# Em produção: use variável de ambiente WEATHER_API_KEY
# Em desenvolvimento: coloque sua chave abaixo
weather.api.key=${WEATHER_API_KEY:d09d78a711f7f215e2f8ec62cd636a8d}
weather.api.base-url=https://api.openweathermap.org/data/2.5

# Geocoding API
geocoding.api.base-url=https://api.openweathermap.org/geo/1.0

# Logging
logging.level.com.weather=DEBUG
logging.level.org.springframework.web=INFO
